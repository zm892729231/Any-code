name: Release Linux

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  release-linux:
    name: Build and Release Linux
    if: ${{ !contains(github.ref_name, '-macos') }}
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${{ github.ref_name }}"
            version="${version#v}"
          else
            version="$(node -p "require('./package.json').version")"
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $version"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: linux-x86_64-unknown-linux-gnu-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
          key: linux-bun-${{ hashFiles('bun.lock', 'package-lock.json', 'package.json') }}
          restore-keys: |
            linux-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build Tauri Linux bundles
        run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Normalize asset names
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          bundle_dir="src-tauri/target/release/bundle"

          appimage_path="$(find "$bundle_dir" -name "*.AppImage" ! -name "*.sig" -type f | head -n 1)"
          appimage_sig="$(find "$bundle_dir" -name "*.AppImage.sig" -type f | head -n 1)"

          if [ -z "$appimage_path" ] || [ -z "$appimage_sig" ]; then
            echo "::error::Missing Linux AppImage or signature."
            exit 1
          fi

          mv "$appimage_path" "$(dirname "$appimage_path")/any-code_${version}_amd64.AppImage"
          mv "$appimage_sig" "$(dirname "$appimage_sig")/any-code_${version}_amd64.AppImage.sig"

      - name: Download existing latest.json
        continue-on-error: true
        shell: bash
        run: |
          curl -fL "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/latest.json" -o latest-existing.json

      - name: Generate latest.json
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          linux_sig="$(find src-tauri/target/release/bundle -name "*.AppImage.sig" -type f | head -n 1)"

          if [ -z "$linux_sig" ]; then
            echo "::error::Missing Linux updater signature."
            exit 1
          fi

          python3 .github/scripts/merge_latest_json.py \
            --version "$VERSION" \
            --tag "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --output latest.json \
            --existing latest-existing.json \
            --platform "linux-x86_64|$linux_sig|any-code_${VERSION}_amd64.AppImage"

      - name: Prepare release notes
        shell: bash
        run: |
          python3 .github/scripts/generate_release_notes.py \
            --version "${{ steps.version.outputs.version }}" \
            --tag "${{ steps.version.outputs.tag }}" \
            --output release-notes.md

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-${{ steps.version.outputs.version }}
          path: |
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.AppImage.sig
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            latest.json
          retention-days: 7

      - name: Publish GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "Any Code $tag" \
              --notes-file release-notes.md
          else
            gh release create "$tag" \
              --title "Any Code $tag" \
              --notes-file release-notes.md
          fi

          mapfile -t files < <(find src-tauri/target/release/bundle -type f \( \
            -name "*.AppImage" -o \
            -name "*.AppImage.sig" -o \
            -name "*.deb" -o \
            -name "*.rpm" \
          \) -print)
          files+=("latest.json")

          gh release upload "$tag" "${files[@]}" --clobber
