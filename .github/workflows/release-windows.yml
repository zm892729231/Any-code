name: Release Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $package = Get-Content package.json -Raw | ConvertFrom-Json
            $version = $package.version
          }

          if (-not ($version -match "^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$")) {
            throw "Invalid version: $version"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Setup Rust
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: windows-x86_64-pc-windows-msvc-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Bun
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
          key: windows-bun-${{ hashFiles('bun.lock', 'package-lock.json', 'package.json') }}
          restore-keys: |
            windows-bun-

      - name: Install frontend dependencies
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        run: bun install

      - name: Build frontend
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        run: bun run build

      - name: Build Tauri Windows bundles
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create portable executable
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $exePath = "src-tauri/target/release/any-code.exe"
          $bundleDir = "src-tauri/target/release/bundle"
          $portablePath = "$bundleDir/any-code_${version}_x64-portable.exe"

          if (-not (Test-Path $exePath)) {
            throw "Missing executable: $exePath"
          }

          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          Copy-Item $exePath $portablePath -Force

      - name: Normalize asset names
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bundleDir = "src-tauri/target/release/bundle"

          $setup = Get-ChildItem $bundleDir -Recurse -File -Filter "*-setup.exe" | Select-Object -First 1
          if ($setup) {
            Rename-Item -LiteralPath $setup.FullName -NewName "any-code_${version}_x64-setup.exe" -Force
          }

          $setupSig = Get-ChildItem $bundleDir -Recurse -File -Filter "*-setup.exe.sig" | Select-Object -First 1
          if ($setupSig) {
            Rename-Item -LiteralPath $setupSig.FullName -NewName "any-code_${version}_x64-setup.exe.sig" -Force
          }

          $msi = Get-ChildItem $bundleDir -Recurse -File -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Rename-Item -LiteralPath $msi.FullName -NewName "any-code_${version}_x64.msi" -Force
          }

          $msiSig = Get-ChildItem $bundleDir -Recurse -File -Filter "*.msi.sig" | Select-Object -First 1
          if ($msiSig) {
            Rename-Item -LiteralPath $msiSig.FullName -NewName "any-code_${version}_x64.msi.sig" -Force
          }

      - name: Generate latest.json
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $bundleDir = "src-tauri/target/release/bundle"
          $setupSig = Get-ChildItem $bundleDir -Recurse -File -Filter "*-setup.exe.sig" | Select-Object -First 1

          if (-not $setupSig) {
            throw "Missing Windows updater signature. Set TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets."
          }

          $signature = (Get-Content -LiteralPath $setupSig.FullName -Raw).Trim()
          if (-not $signature) {
            throw "Windows updater signature is empty."
          }

          $latest = [ordered]@{
            version = $version
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            notes = "See the full changelog at https://github.com/${{ github.repository }}/releases/tag/$tag"
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = "https://github.com/${{ github.repository }}/releases/download/$tag/any-code_${version}_x64-setup.exe"
              }
            }
          }

          $latest | ConvertTo-Json -Depth 10 | Set-Content -Path latest.json -Encoding utf8

      - name: Upload build artifact
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ steps.version.outputs.version }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.exe.sig
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.msi.sig
            latest.json
          retention-days: 7

      - name: Publish GitHub Release
        if: ${{ !endsWith(github.ref_name, '-macos') }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Any Code ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.exe.sig
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.msi.sig
            latest.json
          body: |
            ## Any Code ${{ steps.version.outputs.tag }}

            Windows build artifacts:

            - `any-code_${{ steps.version.outputs.version }}_x64-setup.exe`: installer build with updater support
            - `any-code_${{ steps.version.outputs.version }}_x64-portable.exe`: portable build, manual updates required
            - `latest.json`: Tauri updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
