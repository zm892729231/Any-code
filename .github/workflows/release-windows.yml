name: Release Windows

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  release-windows:
    name: Build and Release Windows
    if: ${{ !contains(github.ref_name, '-macos') }}
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            $package = Get-Content package.json -Raw | ConvertFrom-Json
            $version = $package.version
          }

          if (-not ($version -match "^\d+\.\d+\.\d+([-.][0-9A-Za-z.-]+)?$")) {
            throw "Invalid version: $version"
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=v$version" >> $env:GITHUB_OUTPUT

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: windows-x86_64-pc-windows-msvc-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
          key: windows-bun-${{ hashFiles('bun.lock', 'package-lock.json', 'package.json') }}
          restore-keys: |
            windows-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build Tauri Windows bundles
        run: bun run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create portable executable
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $exePath = "src-tauri/target/release/any-code.exe"
          $bundleDir = "src-tauri/target/release/bundle"
          $portablePath = "$bundleDir/any-code_${version}_x64-portable.exe"

          if (-not (Test-Path $exePath)) {
            throw "Missing executable: $exePath"
          }

          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          Copy-Item $exePath $portablePath -Force

      - name: Normalize asset names
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $bundleDir = "src-tauri/target/release/bundle"

          $setup = Get-ChildItem $bundleDir -Recurse -File -Filter "*-setup.exe" | Select-Object -First 1
          if ($setup) {
            Rename-Item -LiteralPath $setup.FullName -NewName "any-code_${version}_x64-setup.exe" -Force
          }

          $setupSig = Get-ChildItem $bundleDir -Recurse -File -Filter "*-setup.exe.sig" | Select-Object -First 1
          if ($setupSig) {
            Rename-Item -LiteralPath $setupSig.FullName -NewName "any-code_${version}_x64-setup.exe.sig" -Force
          }

          $msi = Get-ChildItem $bundleDir -Recurse -File -Filter "*.msi" | Select-Object -First 1
          if ($msi) {
            Rename-Item -LiteralPath $msi.FullName -NewName "any-code_${version}_x64.msi" -Force
          }

          $msiSig = Get-ChildItem $bundleDir -Recurse -File -Filter "*.msi.sig" | Select-Object -First 1
          if ($msiSig) {
            Rename-Item -LiteralPath $msiSig.FullName -NewName "any-code_${version}_x64.msi.sig" -Force
          }

      - name: Download existing latest.json
        continue-on-error: true
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $url = "https://github.com/${{ github.repository }}/releases/download/$tag/latest.json"
          try {
            Invoke-WebRequest -Uri $url -OutFile latest-existing.json
          } catch {
            Write-Host "No existing latest.json found for $tag, continuing with Windows-only manifest."
          }

      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $bundleDir = "src-tauri/target/release/bundle"
          $setupSig = Get-ChildItem $bundleDir -Recurse -File -Filter "*-setup.exe.sig" | Select-Object -First 1

          if (-not $setupSig) {
            throw "Missing Windows updater signature. Set TAURI_SIGNING_PRIVATE_KEY and TAURI_SIGNING_PRIVATE_KEY_PASSWORD secrets."
          }

          python .github/scripts/merge_latest_json.py `
            --version $version `
            --tag $tag `
            --repo "${{ github.repository }}" `
            --output latest.json `
            --existing latest-existing.json `
            --platform "windows-x86_64|$($setupSig.FullName)|any-code_${version}_x64-setup.exe"

      - name: Prepare release notes
        shell: pwsh
        run: |
          python .github/scripts/generate_release_notes.py `
            --version "${{ steps.version.outputs.version }}" `
            --tag "${{ steps.version.outputs.tag }}" `
            --output release-notes.md

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-${{ steps.version.outputs.version }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.exe.sig
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.msi.sig
            latest.json
          retention-days: 7

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release edit $tag --title "Any Code $tag" --notes-file release-notes.md
          } else {
            gh release create $tag --title "Any Code $tag" --notes-file release-notes.md
            if ($LASTEXITCODE -ne 0) {
              gh release edit $tag --title "Any Code $tag" --notes-file release-notes.md
            }
          }

          $files = Get-ChildItem src-tauri/target/release/bundle -Recurse -File |
            Where-Object { $_.Extension -in '.exe', '.sig', '.msi' } |
            ForEach-Object { $_.FullName }
          $files += (Resolve-Path latest.json).Path

          gh release upload $tag $files --clobber
