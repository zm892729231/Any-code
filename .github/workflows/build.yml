name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS-ARM
            os: macos-15
            rust-target: aarch64-apple-darwin
            tauri-args: --target aarch64-apple-darwin
          - name: macOS-Intel
            os: macos-15-intel
            rust-target: x86_64-apple-darwin
            tauri-args: --target x86_64-apple-darwin
          - name: Linux
            os: ubuntu-22.04
            rust-target: x86_64-unknown-linux-gnu
            tauri-args: ''
          - name: Windows
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: ''

    runs-on: ${{ matrix.platform.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Linux dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          key: ${{ matrix.platform.os }}-${{ matrix.platform.rust-target }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
          key: ${{ matrix.platform.os }}-bun-${{ hashFiles('bun.lock', 'package-lock.json', 'package.json') }}
          restore-keys: |
            ${{ matrix.platform.os }}-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Build Tauri application
        run: bun run tauri build ${{ matrix.platform.tauri-args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Create Windows Portable version
        if: matrix.platform.name == 'Windows' && startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $exePath = "src-tauri/target/release/any-code.exe"
          $portableName = "Any_Code_${version}_x64-portable.exe"
          $portablePath = "src-tauri/target/release/bundle/$portableName"
          New-Item -ItemType Directory -Force -Path "src-tauri/target/release/bundle"
          Copy-Item $exePath $portablePath
          Write-Host "Created portable version: $portableName"

      - name: Upload build artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.platform.name }}
          path: |
            src-tauri/target/*/release/bundle/**/*
            src-tauri/target/release/bundle/**/*
          retention-days: 3

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.platform.name }}
          path: |
            src-tauri/target/*/release/build/*/output
            src-tauri/target/release/build/*/output
          retention-days: 3

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Rename updater files for consistent naming
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          AARCH64_TAR=$(find artifacts -path "*aarch64*" -name "*.app.tar.gz" ! -name "*.sig" -type f | head -n 1)
          AARCH64_SIG=$(find artifacts -path "*aarch64*" -name "*.app.tar.gz.sig" -type f | head -n 1)
          if [ -n "$AARCH64_TAR" ]; then
            AARCH64_DIR=$(dirname "$AARCH64_TAR")
            mv "$AARCH64_TAR" "$AARCH64_DIR/any-code_${VERSION}_aarch64.app.tar.gz"
          fi
          if [ -n "$AARCH64_SIG" ]; then
            AARCH64_DIR=$(dirname "$AARCH64_SIG")
            mv "$AARCH64_SIG" "$AARCH64_DIR/any-code_${VERSION}_aarch64.app.tar.gz.sig"
          fi

          X64_TAR=$(find artifacts -path "*x86_64*" -name "*.app.tar.gz" ! -name "*.sig" -type f | head -n 1)
          X64_SIG=$(find artifacts -path "*x86_64*" -name "*.app.tar.gz.sig" -type f | head -n 1)
          if [ -n "$X64_TAR" ]; then
            X64_DIR=$(dirname "$X64_TAR")
            mv "$X64_TAR" "$X64_DIR/any-code_${VERSION}_x64.app.tar.gz"
          fi
          if [ -n "$X64_SIG" ]; then
            X64_DIR=$(dirname "$X64_SIG")
            mv "$X64_SIG" "$X64_DIR/any-code_${VERSION}_x64.app.tar.gz.sig"
          fi

          WIN_NSIS=$(find artifacts -name "*-setup.exe" ! -name "*.sig" -type f | head -n 1)
          WIN_NSIS_SIG=$(find artifacts -name "*-setup.exe.sig" -type f | head -n 1)
          if [ -n "$WIN_NSIS" ]; then
            WIN_DIR=$(dirname "$WIN_NSIS")
            mv "$WIN_NSIS" "$WIN_DIR/any-code_${VERSION}_x64-setup.exe"
          fi
          if [ -n "$WIN_NSIS_SIG" ]; then
            WIN_DIR=$(dirname "$WIN_NSIS_SIG")
            mv "$WIN_NSIS_SIG" "$WIN_DIR/any-code_${VERSION}_x64-setup.exe.sig"
          fi

          LINUX_APPIMAGE=$(find artifacts -name "*.AppImage" ! -name "*.sig" -type f | head -n 1)
          LINUX_APPIMAGE_SIG=$(find artifacts -name "*.AppImage.sig" -type f | head -n 1)
          if [ -n "$LINUX_APPIMAGE" ]; then
            LINUX_DIR=$(dirname "$LINUX_APPIMAGE")
            mv "$LINUX_APPIMAGE" "$LINUX_DIR/any-code_${VERSION}_amd64.AppImage"
          fi
          if [ -n "$LINUX_APPIMAGE_SIG" ]; then
            LINUX_DIR=$(dirname "$LINUX_APPIMAGE_SIG")
            mv "$LINUX_APPIMAGE_SIG" "$LINUX_DIR/any-code_${VERSION}_amd64.AppImage.sig"
          fi

      - name: Generate latest.json for updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DARWIN_AARCH64_SIG=$(find artifacts -name "*_aarch64.app.tar.gz.sig" -type f | head -n 1)
          DARWIN_X64_SIG=$(find artifacts -name "*_x64.app.tar.gz.sig" -type f | head -n 1)
          LINUX_SIG=$(find artifacts -name "*.AppImage.sig" -type f | head -n 1)
          WINDOWS_NSIS_SIG=$(find artifacts -name "*-setup.exe.sig" -type f | head -n 1)

          python3 .github/scripts/merge_latest_json.py \
            --version "$VERSION" \
            --tag "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --output latest.json \
            --platform "darwin-aarch64|$DARWIN_AARCH64_SIG|any-code_${VERSION}_aarch64.app.tar.gz" \
            --platform "darwin-x86_64|$DARWIN_X64_SIG|any-code_${VERSION}_x64.app.tar.gz" \
            --platform "linux-x86_64|$LINUX_SIG|any-code_${VERSION}_amd64.AppImage" \
            --platform "windows-x86_64|$WINDOWS_NSIS_SIG|any-code_${VERSION}_x64-setup.exe"

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view ${{ github.ref_name }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release notes
        run: |
          python3 .github/scripts/generate_release_notes.py \
            --version "${GITHUB_REF_NAME#v}" \
            --tag "$GITHUB_REF_NAME" \
            --output release-notes.md

      - name: Update release notes
        if: steps.check_release.outputs.exists == 'true'
        run: |
          gh release edit "${{ github.ref_name }}" \
            --title "Any Code ${{ github.ref_name }}" \
            --notes-file release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload assets to existing release
        if: steps.check_release.outputs.exists == 'true'
        run: |
          find artifacts -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
            -o -name "*.msi" -o -name "*.msi.sig" -o -name "*-setup.exe" -o -name "*-setup.exe.sig" \
            -o -name "*-portable.exe" -o -name "*.AppImage" -o -name "*.AppImage.sig" \
            -o -name "*.deb" -o -name "*.rpm" \) -exec gh release upload ${{ github.ref_name }} {} --clobber \;
          gh release upload ${{ github.ref_name }} latest.json --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          mapfile -t files < <(find artifacts -type f \( -name "*.dmg" -o -name "*.app.tar.gz" -o -name "*.app.tar.gz.sig" \
            -o -name "*.msi" -o -name "*.msi.sig" -o -name "*-setup.exe" -o -name "*-setup.exe.sig" \
            -o -name "*-portable.exe" -o -name "*.AppImage" -o -name "*.AppImage.sig" \
            -o -name "*.deb" -o -name "*.rpm" \) -print)
          files+=("latest.json")

          if [ "${#files[@]}" -eq 1 ]; then
            echo "::error::No release artifacts found."
            exit 1
          fi

          gh release create "${{ github.ref_name }}" \
            --title "Any Code ${{ github.ref_name }}" \
            --notes-file release-notes.md \
            "${files[@]}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
