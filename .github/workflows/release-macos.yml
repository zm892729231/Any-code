name: Release macOS

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v5.28.6. Empty uses package.json version."
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.asset-arch }}
    if: ${{ !contains(github.ref_name, '-macos') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset-arch: aarch64
            os: macos-15
            rust-target: aarch64-apple-darwin
          - asset-arch: x64
            os: macos-15-intel
            rust-target: x86_64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          input_tag="${{ inputs.tag }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            raw_tag="${{ github.ref_name }}"
            version="${raw_tag#v}"
          elif [ -n "$input_tag" ]; then
            version="${input_tag#v}"
          else
            version="$(node -p "require('./package.json').version")"
          fi

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Invalid version: $version"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: macos-${{ matrix.rust-target }}-rust-${{ hashFiles('**/Cargo.lock') }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            node_modules
          key: macos-${{ matrix.rust-target }}-bun-${{ hashFiles('bun.lock', 'package-lock.json', 'package.json') }}
          restore-keys: |
            macos-${{ matrix.rust-target }}-bun-

      - name: Install frontend dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Configure macOS signing identity
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE$APPLE_CERTIFICATE_PASSWORD$KEYCHAIN_PASSWORD" ]; then
            if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ] || [ -z "$KEYCHAIN_PASSWORD" ]; then
              echo "::error::APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, and KEYCHAIN_PASSWORD must be configured together."
              exit 1
            fi
            if [ -z "$APPLE_ID" ] || [ -z "$APPLE_PASSWORD" ] || [ -z "$APPLE_TEAM_ID" ]; then
              echo "::error::APPLE_ID, APPLE_PASSWORD, and APPLE_TEAM_ID are required for notarized macOS releases."
              exit 1
            fi

            echo "$APPLE_CERTIFICATE" | base64 -D > certificate.p12
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

            cert_id="$(security find-identity -v -p codesigning build.keychain | awk -F '"' '/Developer ID Application/ {print $2; exit}')"
            if [ -z "$cert_id" ]; then
              echo "::error::No valid Developer ID Application code signing identity found."
              exit 1
            fi

            echo "APPLE_SIGNING_IDENTITY=$cert_id" >> "$GITHUB_ENV"
          else
            echo "::notice::Apple certificate secrets are not configured. Using ad-hoc signing."
          fi

      - name: Build Tauri macOS bundle
        shell: bash
        run: |
          set -o pipefail
          bun run tauri build --target ${{ matrix.rust-target }} --verbose 2>&1 | tee "tauri-build-${{ matrix.asset-arch }}.log"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Normalize asset names
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          asset_arch="${{ matrix.asset-arch }}"
          bundle_dir="src-tauri/target/${{ matrix.rust-target }}/release/bundle"

          dmg_path="$(find "$bundle_dir" -name "*.dmg" -type f -print -quit)"
          tar_path="$(find "$bundle_dir" -name "*.app.tar.gz" ! -name "*.sig" -type f -print -quit)"
          sig_path="$(find "$bundle_dir" -name "*.app.tar.gz.sig" -type f -print -quit)"

          if [ -z "$dmg_path" ]; then
            echo "::error::Missing macOS DMG artifact."
            exit 1
          fi

          if [ -z "$tar_path" ] || [ -z "$sig_path" ]; then
            echo "::error::Missing macOS updater archive or signature."
            exit 1
          fi

          mv "$dmg_path" "$(dirname "$dmg_path")/any-code_${version}_${asset_arch}.dmg"
          mv "$tar_path" "$(dirname "$tar_path")/any-code_${version}_${asset_arch}.app.tar.gz"
          mv "$sig_path" "$(dirname "$sig_path")/any-code_${version}_${asset_arch}.app.tar.gz.sig"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.asset-arch }}-${{ steps.version.outputs.version }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.app.tar.gz
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.app.tar.gz.sig
          retention-days: 7

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-logs-${{ matrix.asset-arch }}-${{ steps.version.outputs.version }}
          path: |
            tauri-build-${{ matrix.asset-arch }}.log
            src-tauri/target/${{ matrix.rust-target }}/release/build/*/output
            src-tauri/target/release/build/*/output
          retention-days: 7

  publish-macos:
    name: Publish macOS Release Assets
    if: ${{ !contains(github.ref_name, '-macos') }}
    needs: build-macos
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          input_tag="${{ inputs.tag }}"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            raw_tag="${{ github.ref_name }}"
            version="${raw_tag#v}"
          elif [ -n "$input_tag" ]; then
            version="${input_tag#v}"
          else
            version="$(node -p "require('./package.json').version")"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: macos-*
          merge-multiple: true

      - name: Download existing latest.json
        continue-on-error: true
        run: |
          curl -fL "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/latest.json" -o latest-existing.json

      - name: Merge updater manifest
        shell: bash
        env:
          VERSION: ${{ steps.version.outputs.version }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          aarch64_sig="$(find artifacts -name "*_aarch64.app.tar.gz.sig" -type f | head -n 1)"
          x64_sig="$(find artifacts -name "*_x64.app.tar.gz.sig" -type f | head -n 1)"

          if [ -z "$aarch64_sig" ] || [ -z "$x64_sig" ]; then
            echo "::error::Missing macOS updater signatures."
            exit 1
          fi

          python3 .github/scripts/merge_latest_json.py \
            --version "$VERSION" \
            --tag "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --output latest.json \
            --existing latest-existing.json \
            --platform "darwin-aarch64|$aarch64_sig|any-code_${VERSION}_aarch64.app.tar.gz" \
            --platform "darwin-x86_64|$x64_sig|any-code_${VERSION}_x64.app.tar.gz"

      - name: Prepare release notes
        shell: bash
        run: |
          python3 .github/scripts/generate_release_notes.py \
            --version "${{ steps.version.outputs.version }}" \
            --tag "${{ steps.version.outputs.tag }}" \
            --output release-notes.md

      - name: Publish GitHub Release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "Any Code $tag" \
              --notes-file release-notes.md
          else
            gh release create "$tag" \
              --title "Any Code $tag" \
              --notes-file release-notes.md
          fi

          mapfile -t files < <(find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" \
          \) -print)
          files+=("latest.json")

          if [ "${#files[@]}" -eq 1 ]; then
            echo "::error::No macOS release artifacts found."
            exit 1
          fi

          gh release upload "$tag" "${files[@]}" --clobber
